<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle Calculator</title>
</head>
<body>
    <h1>Circle Area and Circumference Calculator</h1>
    <label for="radius">Enter radius:</label>
    <input type="number" id="radius" step="any" min="0">
    <button onclick="calculate()">Calculate</button>
    <p id="result"></p>

    <script>
        function calculate() {
            const r = parseFloat(document.getElementById('radius').value);
            if (isNaN(r) || r <= 0) {
                document.getElementById('result').innerHTML = 'Please enter a valid positive radius.';
                return;
            }
            const area = Math.PI * r * r;
            const circumference = 2 * Math.PI * r;
            document.getElementById('result').innerHTML = `Area: ${area.toFixed(2)}<br>Circumference: ${circumference.toFixed(2)}`;
        }
    </script>
</body>
</html>
